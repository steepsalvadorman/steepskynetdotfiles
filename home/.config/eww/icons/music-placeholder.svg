<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="128" height="128" fill="#282828"/>
  
  <!-- Border -->
  <rect width="128" height="128" fill="none" stroke="#3c3836" stroke-width="2"/>
  
  <!-- Music note 1 -->
  <g transform="translate(35, 40)">
    <circle cx="8" cy="35" r="6" fill="#b8bb26"/>
    <rect x="6" y="10" width="2" height="25" fill="#b8bb26"/>
    <rect x="8" y="8" width="12" height="2" fill="#b8bb26"/>
  </g>
  
  <!-- Music note 2 -->
  <g transform="translate(65, 30)">
    <circle cx="8" cy="45" r="6" fill="#fabd2f"/>
    <rect x="6" y="15" width="2" height="30" fill="#fabd2f"/>
    <rect x="8" y="13" width="15" height="2" fill="#fabd2f"/>
  </g>
  
  <!-- Decorative line -->
  <line x1="20" y1="90" x2="108" y2="90" stroke="#504945" stroke-width="2" stroke-linecap="round"/>
</svg>
