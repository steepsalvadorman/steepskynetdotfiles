#============================================================
#  hyprland.conf — Steep @ ArchLinux
#  Sintaxis: hyprlang v3 (0.53–0.54)
# ============================================================

# --- VARIABLES DE ENTORNO NVIDIA/WAYLAND ---
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = NVD_BACKEND,direct
env = __GL_SHADER_DISK_CACHE,1
env = __GL_SHADER_DISK_CACHE_SKIP_CLEANUP,1
env = PROTON_ENABLE_NVAPI,1
env = DXVK_ASYNC,1
env = VKD3D_FEATURE_LEVEL,12_2

$mainMod = SUPER
$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun

# --- MONITOR ---
monitor = DP-1, 2560x1440@180.00, 0x0, 1

# --- INPUT ---
input {
    kb_layout = latam
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
}

# --- APARIENCIA ---
source = ~/.cache/wal/colors-hyprland.conf

general {
    gaps_in = 3
    gaps_out = 4, 13, 4, 13
    border_size = 2
    col.active_border = $color_active1 $color_active2 45deg
    col.inactive_border = $color_inactive
    layout = dwindle
    allow_tearing = true
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 14
        passes = 4
        noise = 0.008
        contrast = 0.90
        brightness = 1.05
        vibrancy = 0.30
        vibrancy_darkness = 0.0
        new_optimizations = true
        xray = false
    }
    dim_inactive = true
    dim_strength = 0.1

    shadow {
        enabled = false
    }
}

animations {
    enabled = true

    bezier = fluent_decel, 0.1, 1, 0, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutQuint, 0.83, 0, 0.17, 1
    bezier = linear, 0, 0, 1, 1
    animation = windows, 1, 5, easeOutQuint, popin 60%
    animation = windowsIn, 1, 5, easeOutQuint, popin 60%
    animation = windowsOut, 1, 4, fluent_decel, popin 80%
    animation = windowsMove, 1, 5, easeOutQuint, slide

    animation = layers, 1, 4, easeOutQuint, fade
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 3, fluent_decel, fade

    animation = border, 1, 3, easeOutQuint
    animation = borderangle, 1, 30, linear, loop
    animation = fade, 1, 3, easeOutExpo
    animation = fadeDim, 1, 3, easeOutExpo

    animation = workspaces, 1, 6, easeInOutQuint, slide
    animation = specialWorkspace, 1, 6, easeInOutQuint, slidevert
}

dwindle {
    preserve_split = true
}

# --- RENDER ---
# explicit_sync es automático desde 0.50, no necesita configurarse
render {
    direct_scanout = true
}

cursor {
    no_hardware_cursors = false
}

# --- MISC ---
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vrr = 2
}

# --- AUTO-EJECUCIÓN ---

# 1. Variables de entorno críticas para D-Bus y Systemd (SIEMPRE PRIMERO)
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP


# 2. EWW (deshabilitado — migrado a AGS)
# exec-once = ~/.config/hypr/scripts/start-eww.sh

# 2b. AGS bar
exec-once = ags run --gtk 4 ~/.config/ags/app.ts

# 2. Demonios del Sistema y Red
exec-once = awww-daemon
exec-once = nm-applet --indicator
exec-once = swaync

# 3. Interfaz Gráfica Asíncrona (Manejada por Systemd)

# --- BINDS ---
bind = $mainMod, Escape, exec, ~/.config/hypr/scripts/stop-record.sh
bind = $mainMod SHIFT, R, exec, ~/.config/hypr/scripts/record-region.sh
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, R, exec, $menu
bind = $mainMod, W, exec, bash -c '~/.config/hypr/scripts/wallhaven.sh &>/tmp/wallpaper.log &'
bind = $mainMod, F, fullscreen,
bind = $mainMod, B, exec, eww toggle bar
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
bind = $mainMod, J, layoutmsg, togglesplit

binde = $mainMod SHIFT, right, resizeactive, 80 0
binde = $mainMod SHIFT, left, resizeactive, -80 0
binde = $mainMod SHIFT, up, resizeactive, 0 -80
binde = $mainMod SHIFT, down, resizeactive, 0 80

# Captura de pantalla (Completa / Área seleccionada)
bind = , Print, exec, grim -g "$(slurp)" - | tee ~/Imágenes/$(date +%Y-%m-%d_%H-%M-%S).png | wl-copy --type image/png
bind = SHIFT, Print, exec, grim ~/Imágenes/$(date +%Y-%m-%d_%H-%M-%S).png && wl-copy < ~/Imágenes/$(date +%Y-%m-%d_%H-%M-%S).png

# Audio (Control con rueda de audífonos / teclas multimedia)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Control de reproducción multimedia (playerctl)
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

bind = , XF86MonBrightnessUp, exec, hyprctl keyword decoration:screen_shader ""
bind = $mainMod, F3, exec, wlr-randr --output DP-1 --brightness 1.0
bind = $mainMod, F2, exec, wlr-randr --output DP-1 --brightness 0.7
bind = $mainMod, F1, exec, wlr-randr --output DP-1 --brightness 0.4

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- REGLAS DE CAPA ---
# Blur para la barra de EWW

layerrule {
    name = wofi_blur
    match:namespace = wofi
    blur = true
    ignore_alpha = true
}

layerrule {
    name = rofi_opaque
    match:namespace = rofi
    blur = false
}

# --- REGLAS DE CAPA: POPUP AGS PROYECTOS ---
layerrule {
    name = ags-projects-popup
    match:namespace = projects-popup
    blur = true
    ignore_alpha = 0.1
}

# --- REGLAS DE VENTANA: JUEGOS DE STEAM ---
# La sintaxis v3 requiere siempre name = como primera línea
windowrule {
    name = steam-games
    match:class = ^(steam_app_.*)$
    immediate = on
    fullscreen = on
    no_blur = on
    no_shadow = on
    border_size = 0
    dim_around = 0
}

windowrule {
    name = diablo4
    match:class = ^(steam_app_2344520)$
    immediate = on
}

windowrule {
    name = marvel-rivals
    match:class = ^(steam_app_2767030)$
    immediate = on
}


xwayland {
    force_zero_scaling = true
}
