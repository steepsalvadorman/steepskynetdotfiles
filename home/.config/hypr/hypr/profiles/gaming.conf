# Gaming Performance Mode - Minimal overhead

# Desactivar animaciones
animations {
    enabled = false
}

# Desactivar blur
decoration {
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
    dim_inactive = false
}

# Direct scanout para máximo performance
render {
    direct_scanout = true
}

# VRR mode
misc {
    vrr = 2  # Fullscreen optimized
}
